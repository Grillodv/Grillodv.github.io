<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Suicune Neon</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- PARTICULAS -->

  <div class="particles">

    <span class="particle" style="left:10%; animation-duration:10s;"></span>
    <span class="particle" style="left:20%; animation-duration:14s;"></span>
    <span class="particle" style="left:30%; animation-duration:9s;"></span>
    <span class="particle" style="left:40%; animation-duration:13s;"></span>
    <span class="particle" style="left:50%; animation-duration:11s;"></span>
    <span class="particle" style="left:60%; animation-duration:15s;"></span>
    <span class="particle" style="left:70%; animation-duration:8s;"></span>
    <span class="particle" style="left:80%; animation-duration:12s;"></span>
    <span class="particle" style="left:90%; animation-duration:10s;"></span>

  </div>

  <!-- CONTENIDO -->

  <div class="contenido">

    <h1>SUICUNE 💧❄️</h1>

    <div class="card" id="battleCard">

      <h2 id="titulo">Neutro</h2>

      <img
      id="suicuneImage"
      src="Style/agua.jpg"
      alt="Suicune">

      <!-- BOTON BATALLA -->

      <button id="battleButton">
        ⚔️ MODO BATALLA
      </button>

      <!-- BOTON ATAQUE -->

      <button
      id="attackButton"
      class="hidden">

        💥 USAR ATAQUE

      </button>

    </div>

  </div>

<script>

  // ===== AUDIOS =====

  const audioBattle =
  new Audio("Sounds/batalla.mp3");

  const audioAttack =
  new Audio("Sounds/ataque.mp3");

  // ===== ELEMENTOS =====

  const battleCard =
  document.getElementById("battleCard");

  const particles =
  document.querySelectorAll(".particle");

  const image =
  document.getElementById("suicuneImage");

  const titulo =
  document.getElementById("titulo");

  const battleButton =
  document.getElementById("battleButton");

  const attackButton =
  document.getElementById("attackButton");

  // ===== ESTADO =====

  let battleMode = false;

  // ===== EVENTOS =====

  battleButton.addEventListener(
  "click",
  toggleBattleMode
  );

  attackButton.addEventListener(
  "click",
  useAttack
  );

  // ===== MODO BATALLA =====

  function toggleBattleMode(){

    battleMode = !battleMode;

    // =====================
    // ACTIVAR
    // =====================

    if(battleMode){

      image.src = "Style/suicune.jpg";

      titulo.innerText =
      "Battle Mode";

      battleButton.innerText =
      "❌ DESACTIVAR";

      // MOSTRAR BOTON ATAQUE

      attackButton.classList.remove(
      "hidden"
      );

      // AUDIO

      audioBattle.pause();

      audioBattle.currentTime = 0;

      audioBattle.loop = true;

      audioBattle.play();

      // EFECTOS

      battleCard.classList.add(
      "battle-active"
      );

      particles.forEach(particle => {

        particle.classList.add(
        "particle-red"
        );

      });

    }

    // =====================
    // DESACTIVAR
    // =====================

    else{

      image.src = "Style/agua.jpg";

      titulo.innerText = "Neutro";

      battleButton.innerText =
      "⚔️ MODO BATALLA";

      // OCULTAR BOTON ATAQUE

      attackButton.classList.add(
      "hidden"
      );

      // DETENER AUDIOS

      audioBattle.pause();

      audioBattle.currentTime = 0;

      audioAttack.pause();

      audioAttack.currentTime = 0;

      // QUITAR EFECTOS

      battleCard.classList.remove(
      "battle-active"
      );

      battleCard.classList.remove(
      "attack-active"
      );

      particles.forEach(particle => {

        particle.classList.remove(
        "particle-red"
        );

      });
    }
  }

  // ===== ATAQUE =====

  function useAttack(){

    // CAMBIAR IMAGEN

    image.src = "Style/ataque.png";

    // CAMBIAR TITULO

    titulo.innerText =
    "Hydro Attack";

    // SONIDO ATAQUE

    audioAttack.pause();

    audioAttack.currentTime = 0;

    audioAttack.play();

    // EFECTO EXTRA

    battleCard.classList.add(
    "attack-active"
    );

    // VOLVER A IMAGEN NORMAL

    setTimeout(() => {

      image.src = "Style/suicune.jpg";

      titulo.innerText =
      "Battle Mode";

      battleCard.classList.remove(
      "attack-active"
      );

    }, 2500);
  }

</script>

</body>
</html>
